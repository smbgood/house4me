<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trulia Scanner Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>House4Me Trulia Scanner Settings</h1>
      <form id="settingsForm">
        <label for="ingestUrl">Ingest URL</label>
        <input
          id="ingestUrl"
          name="ingestUrl"
          type="url"
          required
          placeholder="https://your-site.netlify.app/.netlify/functions/ingest-trulia-listings"
        />

        <label for="ingestToken">Ingest Token</label>
        <input id="ingestToken" name="ingestToken" type="password" required />

        <button type="submit">Save settings</button>
      </form>
      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
