<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rental Scanner Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>House4Me Rental Scanner Settings</h1>
      <form id="settingsForm">
        <label for="truliaIngestUrl">Trulia Ingest URL</label>
        <input
          id="truliaIngestUrl"
          name="truliaIngestUrl"
          type="url"
          required
          placeholder="https://your-site.netlify.app/.netlify/functions/ingest-trulia-listings"
        />

        <label for="truliaIngestToken">Trulia Ingest Token</label>
        <input id="truliaIngestToken" name="truliaIngestToken" type="password" required />

        <label for="forrentIngestUrl">ForRent Ingest URL</label>
        <input
          id="forrentIngestUrl"
          name="forrentIngestUrl"
          type="url"
          required
          placeholder="https://your-site.netlify.app/.netlify/functions/ingest-forrent-listings"
        />

        <label for="forrentIngestToken">ForRent Ingest Token</label>
        <input id="forrentIngestToken" name="forrentIngestToken" type="password" required />

        <label for="zillowIngestUrl">Zillow Ingest URL</label>
        <input
          id="zillowIngestUrl"
          name="zillowIngestUrl"
          type="url"
          required
          placeholder="https://your-site.netlify.app/.netlify/functions/ingest-zillow-listings"
        />

        <label for="zillowIngestToken">Zillow Ingest Token</label>
        <input id="zillowIngestToken" name="zillowIngestToken" type="password" required />

        <button type="submit">Save settings</button>
      </form>
      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
