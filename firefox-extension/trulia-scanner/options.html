<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rental Scanner Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>House4Me Rental Scanner Settings</h1>
      <p class="endpoint-info">
        Listings are sent to <code id="ingestBaseUrl"></code> with source-specific ingest paths.
      </p>
      <form id="settingsForm">
        <label for="truliaIngestToken">Trulia Ingest Token</label>
        <input id="truliaIngestToken" name="truliaIngestToken" type="password" required />

        <label for="forrentIngestToken">ForRent Ingest Token</label>
        <input id="forrentIngestToken" name="forrentIngestToken" type="password" required />

        <label for="zillowIngestToken">Zillow Ingest Token</label>
        <input id="zillowIngestToken" name="zillowIngestToken" type="password" required />

        <label for="realtorIngestToken">Realtor.com Ingest Token</label>
        <input id="realtorIngestToken" name="realtorIngestToken" type="password" required />

        <button type="submit">Save settings</button>
      </form>
      <p id="status"></p>
    </main>
    <script src="config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
